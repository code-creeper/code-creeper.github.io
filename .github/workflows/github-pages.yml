name: Build Nuxt Site

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install

      - name: Generate static site
        run: pnpm generate
        env:
          NUXT_BASE_URL: /

      - name: Upload generated site
        uses: actions/upload-artifact@v4
        with:
          name: nuxt-site
          path: .output/public