services:
  app:
    image: "node:22-alpine"
    container_name: "portfolio_node_container"
    restart: "always"
    working_dir: /var/www/html
    volumes:
      - "./:/var/www/html"
    ports:
      - "3000:3000"
    networks:
      - shared_bridge
    command: sh -c "npm install && npm run build && npm run preview"

networks:
  shared_bridge:
    external: true
